{% set name = "dqsegdb" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0afbd96d9d720c98df7a72abf2b2a35bdbbc4178ee570ea35fe617633be9d12f
  patches:
    - 0001-Remove-lalsuite-requirement.patch

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  skip: true  # [win or py>=312]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  host:
    - pip
    - python
    - setuptools
  run:
    - gpstime
    - gwdatafind
    - igwn-ligolw
    - igwn-segments
    - lscsoft-glue >=3.0.1
    - pyopenssl >=0.14
    - pyrxp
    - python
    - python-lal

test:
  requires:
    - pip
    - pytest
  imports:
    - dqsegdb
    - dqsegdb.apicalls
    - dqsegdb.clientutils
    - dqsegdb.jsonhelper
    - dqsegdb.urifunctions
  commands:
    # check requirements
    - python -m pip check
    # run test suite
    - python -m pytest -ra -v --pyargs dqsegdb.tests
    # check scripts
    - ligolw_dq_query_dqsegdb --help
    - ligolw_publish_threaded_dqxml_dqsegdb --help
    - ligolw_segment_insert_dqsegdb --help
    - ligolw_segment_query_dqsegdb --help
    - ligolw_segments_from_cats_dqsegdb --help

about:
  home: https://git.ligo.org/computing/dqsegdb/client
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Client library for DQSegDB

extra:
  recipe-maintainers:
    - duncanmmacleod
    - rpfisher
    - robertbruntz
